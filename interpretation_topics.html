<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통역 방학 학습 주제표</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; padding: 2rem 1rem; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; color: #1a1a1a; }
.subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
.search-wrap { margin-bottom: 1rem; }
.search-wrap input { width: 100%; max-width: 500px; padding: 9px 14px; font-size: 14px; border-radius: 8px; border: 1px solid #ddd; background: white; color: #1a1a1a; outline: none; }
.search-wrap input:focus { border-color: #185FA5; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid #ccc; background: white; color: #666; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { background: #f0f0f0; }
.filter-btn.active-all { background: #444; color: white; border-color: #444; }
.filter-btn.active-always { background: #185FA5; color: white; border-color: #185FA5; }
.filter-btn.active-recent { background: #A32D2D; color: white; border-color: #A32D2D; }
.count-bar { font-size: 13px; color: #999; margin-bottom: 1rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.card { background: white; border: 1px solid #e8e8e4; border-radius: 12px; overflow: hidden; }
.card-header { padding: 11px 14px; display: flex; align-items: center; gap: 8px; background: white; }
.card-header .num { font-size: 11px; font-weight: 600; color: #aaa; }
.card-header .title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.section { padding: 8px 14px 10px; border-top: 1px solid #f0f0ee; }
.section-label { font-size: 11px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; letter-spacing: 0.02em; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.always .section-label { color: #185FA5; }
.always .dot { background: #185FA5; }
.recent .section-label { color: #A32D2D; }
.recent .dot { background: #E24B4A; }
.topic-list { display: flex; flex-direction: column; gap: 2px; }
.topic-item { font-size: 13px; color: #333; padding: 2px 0; line-height: 1.5; }
.topic-item::before { content: "·"; margin-right: 5px; color: #bbb; }
</style>
</head>
<body>
<h1>통역 방학 학습 주제표</h1>
<p class="subtitle">16개 대주제 · 항시 중요 주제 4개 + 최근 이슈 3개</p>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="주제 검색... (예: AI, 기후, 반도체)">
</div>
<div class="filter-bar">
  <button class="filter-btn active-all" id="btn-all" onclick="setFilter('all')">전체 (16)</button>
  <button class="filter-btn" id="btn-always" onclick="setFilter('always')">항시 중요 주제만</button>
  <button class="filter-btn" id="btn-recent" onclick="setFilter('recent')">최근 이슈만</button>
</div>
<div class="count-bar" id="countBar">16개 대주제 표시 중</div>
<div class="grid" id="cardGrid"></div>

<script>
var topics = [
  { id:1, name:"경영", always:["기업 지배구조 (Corporate Governance)","M&A와 기업 인수합병","ESG 경영 및 지속가능성 전략","글로벌 공급망 관리 (SCM)"], recent:["AI 기반 경영 의사결정","스타트업 생태계와 유니콘 기업","탈세계화 시대의 리쇼어링 전략"] },
  { id:2, name:"경제", always:["인플레이션과 통화정책","글로벌 무역 시스템과 WTO","국제 분업과 비교우위론","GDP 측정과 경제성장 지표"], recent:["미국 관세정책과 무역전쟁 재점화","스태그플레이션 우려와 연준 딜레마","중국 디플레이션 심화와 세계경제 영향"] },
  { id:3, name:"교육", always:["교육 불평등과 교육격차","고등교육 시스템 개혁","PISA 국제학업성취도 평가","평생학습과 직업훈련"], recent:["생성형 AI의 교육 현장 도입","대학 학력 인플레이션과 학벌주의 탈피","디지털 교육 격차 (Digital Divide)"] },
  { id:4, name:"국제", always:["UN 체제와 다자외교","미중 패권 경쟁","국제 인도주의 지원","지역 통합과 FTA 체결"], recent:["트럼프 행정부의 다자주의 후퇴","글로벌 사우스의 부상","나토 확장과 유럽 안보 재편"] },
  { id:5, name:"금융", always:["중앙은행 통화정책 및 기준금리","금융시장 규제 (바젤 협약)","외환시장과 환율 변동","국채·회사채 시장과 신용등급"], recent:["가상자산 제도화와 SEC 규제 동향","기후금융과 녹색채권 (Green Bond)","헤지펀드 레버리지 리스크와 시장 변동성"] },
  { id:6, name:"문화", always:["문화유산 보호와 유네스코","한류 (K-Culture)의 세계화","문화 다양성과 문화제국주의 논쟁","예술 지원 정책과 공공재원"], recent:["OTT 플랫폼과 콘텐츠 산업 재편","AI 생성 예술과 저작권 논쟁","문화재 반환 요구 움직임 확산"] },
  { id:7, name:"사회", always:["고령화와 인구 구조 변화","이민·난민 문제","사회 불평등과 빈곤층 지원","젠더 평등과 여성 권리"], recent:["포퓰리즘 확산과 사회 양극화","저출생 위기와 국가별 정책 대응","SNS와 사회적 고립·정신건강 문제"] },
  { id:8, name:"산업", always:["제조업 고도화와 스마트 팩토리","농업·식량 안보","해운·물류 글로벌 공급망","자동차 산업 패러다임 변화"], recent:["반도체 공급망 재편과 칩 전쟁","희토류·핵심광물 자원 전쟁","전기차 보급과 배터리 기술 경쟁"] },
  { id:9, name:"안보", always:["핵 비확산 체제 (NPT)와 군비통제","사이버 안보와 국가 주도 해킹","테러리즘과 국제 대응 협력","러시아-우크라이나 전쟁"], recent:["우주 군사화와 우주 거버넌스","드론·무인체계의 전장 혁신","중국의 대만 압박과 인도·태평양 긴장"] },
  { id:10, name:"에너지", always:["에너지 안보와 자원 의존성","재생에너지 전환 (태양광·풍력)","원자력 에너지 르네상스 논쟁","에너지 빈곤과 개발도상국 전력 접근성"], recent:["중국의 전기국가 (Electrostate) 부상","EU 탄소국경조정제도 (CBAM) 시행","소형모듈원자로 (SMR) 상용화 경쟁"] },
  { id:11, name:"의료", always:["보편적 의료보장 (UHC)과 의료 접근성","신종 감염병과 팬데믹 대응 체계","의약품 지식재산권과 특허 분쟁","고령사회와 만성질환 관리"], recent:["AI 진단·신약 개발 활용 확산","글로벌 보건 원조 삭감과 WHO 재정 위기","항생제 내성 (AMR) 위기"] },
  { id:12, name:"인권", always:["난민·망명자 보호와 국제법","표현의 자유와 언론 탄압","노동권과 강제노동 근절","소수자·선주민 권리 보호"], recent:["AI와 감시기술에 의한 인권 침해","분쟁 지역 민간인 피해와 국제인도법","여성 인권 후퇴 (미국 낙태권·아프간 사례)"] },
  { id:13, name:"정치", always:["민주주의 후퇴와 권위주의 확산","선거 제도와 정치 참여","삼권분립과 사법 독립","포퓰리즘의 정치적 부상"], recent:["트럼프 2기 행정부와 미국 내 권력 집중","유럽 극우 정당의 주류화","AI·딥페이크와 선거 개입 우려"] },
  { id:14, name:"환경", always:["지구온난화와 기상이변","생물다양성 손실과 생태계 붕괴","해양 오염과 플라스틱 문제","산림 파괴와 탄소 흡수원"], recent:["탄소배출권 거래제도 (ETS) 확산","기후 소송과 국가 책임론 부상","기후변화 적응 재원과 손실·피해 기금"] },
  { id:15, name:"인문", always:["역사 왜곡과 역사 인식 문제","언어 다양성과 소멸 위기 언어","종교 갈등과 문명 충돌론","철학적 윤리와 AI 시대의 인간 가치"], recent:["AI 시대의 인문학적 위기와 교육 재편","식민지 역사 청산과 배상 논쟁","탈진실 (Post-truth) 시대와 서사 전쟁"] },
  { id:16, name:"IT", always:["인공지능 (AI) 규제와 거버넌스","개인정보 보호와 디지털 프라이버시","사이버 보안과 랜섬웨어 위협","플랫폼 독점과 빅테크 규제"], recent:["생성형 AI의 산업 전반 파급 효과","반도체 수출 통제와 기술 패권 경쟁","저궤도 위성 인터넷과 우주 인터넷 거버넌스"] }
];

var currentFilter = 'all';

function setFilter(type) {
  currentFilter = type;
  ['all','always','recent'].forEach(function(t) {
    document.getElementById('btn-' + t).className = 'filter-btn';
  });
  document.getElementById('btn-' + type).className = 'filter-btn active-' + type;
  render();
}

document.getElementById('searchInput').addEventListener('input', render);

function render() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  var count = 0;

  topics.forEach(function(t) {
    var matchSearch = !q ||
      t.name.toLowerCase().includes(q) ||
      t.always.some(function(s){ return s.toLowerCase().includes(q); }) ||
      t.recent.some(function(s){ return s.toLowerCase().includes(q); });
    if (!matchSearch) return;
    count++;

    var alwaysHtml = '';
    var recentHtml = '';

    if (currentFilter === 'all' || currentFilter === 'always') {
      alwaysHtml = '<div class="section always"><div class="section-label"><span class="dot"></span>항시 중요 주제</div><div class="topic-list">' +
        t.always.map(function(s){ return '<div class="topic-item">' + s + '</div>'; }).join('') +
        '</div></div>';
    }
    if (currentFilter === 'all' || currentFilter === 'recent') {
      recentHtml = '<div class="section recent"><div class="section-label"><span class="dot"></span>최근 이슈</div><div class="topic-list">' +
        t.recent.map(function(s){ return '<div class="topic-item">' + s + '</div>'; }).join('') +
        '</div></div>';
    }

    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-header"><span class="num">' + String(t.id).padStart(2,'0') + '</span><span class="title">' + t.name + '</span></div>' +
      alwaysHtml + recentHtml;
    grid.appendChild(card);
  });

  document.getElementById('countBar').textContent = count + '개 대주제 표시 중';
}

render();
</script>
</body>
</html>
